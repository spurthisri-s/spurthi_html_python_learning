<!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
        }

        .card{
            width:300px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
            text-align:center;
        }

        img{
            width:100px;
            border-radius:50%;
        }

    </style>

</head>

<body>

<div class="card">

    <img src="https://via.placeholder.com/100" alt="Profile">

    <h2>S. Durga Spurthi Sri</h2>

    <p>Python & Web Development Learner</p>

    <button>Follow</button>

</div>

</body>
</html>
