<!DOCTYPE html>
<html>
<head>
    <title>Day 11 Flexbox</title>

    <style>

        .container {
            display: flex;
            gap: 20px;
        }

        .box {
            border: 2px solid black;
            padding: 20px;
            width: 100px;
            text-align: center;
        }

    </style>

</head>
<body>

    <h1>Flexbox Example</h1>

    <div class="container">

        <div class="box">Box 1</div>

        <div class="box">Box 2</div>

        <div class="box">Box 3</div>

    </div>

</body>
</html>
