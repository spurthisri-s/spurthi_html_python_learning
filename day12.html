<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f4f4f4;
        }

        .container{
            width:300px;
            margin:auto;
            margin-top:50px;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:8px;
            margin:5px 0;
        }

        button{
            width:100%;
            padding:10px;
        }

    </style>

</head>
<body>

<div class="container">

<h2>Registration Form</h2>

<input type="text" placeholder="Enter Name">

<input type="email" placeholder="Enter Email">

<input type="password" placeholder="Enter Password">

<button>Register</button>

</div>

</body>
</html>
